<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" href="/favicon2.png">
  <title>Schedulr — Smart Scheduling Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <style>
    /* ---------------- palette: Blue Eclipse ---------------- */
    :root{
      --midnight:#272757;
      --eclipse:#0F0E47;
      --slate:#505081;
      --indigo:#8686AC;
      --muted:#9ba0c2;
      --white: #ffffff;
      --card-bg: rgba(255,255,255,0.96);
      --glass: rgba(255,255,255,0.06);
      --radius: 14px;
    }

    /* ---- base ---- */
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg, var(--eclipse) 0%, var(--slate) 100%);
      color: var(--midnight);
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:48px 20px;
    }

    /* container */
    .wrap{
      width:100%;
      max-width:920px;
      display:flex;
      flex-direction:column;
      gap:28px;
      align-items:center;
    }

    header{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      color:var(--white);
      text-align:center;
    }

    .brand{
      display:flex;
      gap:12px;
      align-items:center;
    }

    /* inline logo circle + S */
    .logo {
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border-radius: 16px;          /* Rounded edges */
  
}



.logo-img {
  width: 75px;
  height: 75px;
  object-fit: contain;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35));
}

    .brand h1{
      margin:0;
      font-family:Poppins, Inter, system-ui;
      font-weight:700;
      font-size:28px;
      color: var(--white);
      letter-spacing:-0.4px;
    }
    .brand p{
      margin:0;
      font-size:13px;
      color: var(--indigo);
      opacity:0.9;
      margin-top:4px;
      font-weight:500;
    }

    /* card */
    .card{
      width:100%;
      border-radius:18px;
      padding:28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(250,250,250,0.94));
      box-shadow: 0 14px 40px rgba(8,10,30,0.45);
      border: 1px solid rgba(8,10,30,0.06);
      color: #111;
    }

    form {display:block}
    .row {display:flex; gap:16px; align-items:stretch}
    .col {flex:1; min-width:0}
    label{display:block;font-size:13px;color:#6b6f86;margin-bottom:8px;font-weight:600}
    input[type="text"], input[type="number"]{
      width:100%;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid rgba(16,18,40,0.06);
      background: #fff;
      font-size:15px;
      color:#111;
      outline:none;
      box-shadow: 0 1px 0 rgba(16,18,40,0.02);
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {opacity:0.4}

    /* layout spacing ensures no overlap */
    .field-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:18px;
      margin-bottom:18px;
    }

    .action{
      display:flex;
      gap:14px;
      align-items:center;
      margin-top:6px;
      margin-bottom:6px;
    }

    .btn-primary{
      display:inline-block;
      background: linear-gradient(180deg,var(--midnight), var(--eclipse));
      color:var(--white);
      padding:14px 18px;
      border-radius:12px;
      border:0;
      cursor:pointer;
      font-weight:700;
      font-family:Poppins, Inter;
      letter-spacing:0.2px;
      width:100%;
      box-shadow: 0 10px 30px rgba(2,6,30,0.45);
    }
    .btn-primary:hover{transform:translateY(-2px)}

    .btn-row {
      display:flex;
      gap:12px;
      justify-content:center;
      margin:18px 0;
      flex-wrap:wrap;
    }

    .btn-ghost{
      background:transparent;
      border:1px solid rgba(16,18,40,0.06);
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      color:var(--midnight);
      min-width:120px;
      box-shadow: 0 6px 18px rgba(16,18,40,0.06);
    }
    .btn-ghost:hover{background: rgba(16,18,40,0.02)}

    /* window inputs */
    .window-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:18px;
      margin-top:16px;
      align-items:center;
    }

    .table-wrap {margin-top:20px; min-height:84px; text-align:center; color:#777}
    table {width:100%; border-collapse:collapse; border-radius:10px; overflow:hidden}
    th,td {padding:10px; text-align:center; font-size:14px; border-bottom:1px solid rgba(16,18,40,0.04)}
    th {background: rgba(15,14,71,0.04); color: #444; text-transform:uppercase; font-size:12px}

    .result-box {margin-top:14px; padding:12px; background:linear-gradient(180deg,var(--indigo), rgba(134,134,172,0.12)); color:var(--white); border-radius:10px; display:none; text-align:center; font-weight:700}

    /* toast */
    .toast {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: rgba(2,4,30,0.9);
      color: #fff;
      padding: 10px 18px;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(2,6,30,0.5);
      z-index: 9999;
      opacity: 0;
      transition: all 0.28s ease;
      pointer-events:none;
      font-weight:600;
    }
    .toast.show {opacity:1; transform: translateX(-50%) translateY(0); pointer-events:auto}

    /* responsive */
    @media (max-width:720px){
      .field-grid, .window-grid {grid-template-columns: 1fr}
      .brand h1{font-size:20px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo">
  <img src="/favicon2.png" alt="Schedulr Logo" class="logo-img">
</div>


        <div style="text-align:left">
          <h1>Schedulr</h1>
          <div style="font-size:13px;color:rgba(255,255,255,0.85);margin-top:4px">Smart Scheduling Assistant</div>
        </div>
      </div>
    </header>

    <main class="card" role="main" aria-labelledby="title">
      <form id="scheduleForm" autocomplete="off">
        <div style="margin-bottom:14px">
          <label for="name">Name</label>
          <input id="name" type="text" placeholder="Enter name" />
        </div>

        <div class="field-grid">
          <div>
            <label for="start">Start (hrs)</label>
            <input id="start" type="number" step="0.1" placeholder="e.g. 9.0" />
          </div>
          <div>
            <label for="end">End (hrs)</label>
            <input id="end" type="number" step="0.1" placeholder="e.g. 17.0" />
          </div>
        </div>

        <div class="action">
          <button type="submit" class="btn-primary">Save Availability</button>
        </div>

        <div class="btn-row" aria-hidden="false">
          <button type="button" class="btn-ghost" id="refreshBtn">View All</button>
          <button type="button" class="btn-ghost" id="findSlotBtn">Find Best Slot</button>
          <button type="button" class="btn-ghost" id="clearBtn">Clear Data</button>
        </div>

        <div class="window-grid" style="margin-top:6px">
          <div>
            <label for="windowStart">Window Start</label>
            <input id="windowStart" type="number" step="0.1" value="9.0" />
          </div>
          <div>
            <label for="windowEnd">Window End</label>
            <input id="windowEnd" type="number" step="0.1" value="18.0" />
          </div>
        </div>
      </form>

      <div id="tableContainer" class="table-wrap" aria-live="polite">
        <p style="color:#7a7e92">No data yet.</p>
      </div>

      <div id="resultBox" class="result-box" role="status" aria-live="polite" style="display:none"></div>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    // helper toast
    const toast = document.getElementById('toast');
    function showToast(msg, timeout=2200){
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(()=> toast.classList.remove('show'), timeout);
    }

    // convenience
    const nameInput = document.getElementById('name');
    const startInput = document.getElementById('start');
    const endInput = document.getElementById('end');
    const windowStart = document.getElementById('windowStart');
    const windowEnd = document.getElementById('windowEnd');
    const tableContainer = document.getElementById('tableContainer');
    const resultBox = document.getElementById('resultBox');

    async function postJSON(url, data){
      try{
        const res = await fetch(url, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(data)
        });
        return await res.json();
      }catch(e){
        console.error(e);
        return { error: 'Network error' };
      }
    }

    // Save availability
    document.getElementById('scheduleForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const name = nameInput.value.trim();
      const start = parseFloat(startInput.value);
      const end = parseFloat(endInput.value);
      if(!name || Number.isNaN(start) || Number.isNaN(end)){
        return showToast('Please fill all fields.');
      }
      showToast('Saving...');
      const out = await postJSON('/schedule', {name, start, end});
      if(out && out.message) showToast(out.message);
      else if(out && out.error) showToast('Error: ' + out.error);
      nameInput.value=''; startInput.value=''; endInput.value='';
      await refreshTable();
    });

    // Refresh list
    async function refreshTable(){
      try{
        const res = await fetch('/availabilities');
        const data = await res.json();
        if(!data || !data.length){
          tableContainer.innerHTML = '<p style="color:#7a7e92">No data yet.</p>';
          return;
        }
        const rows = data.map(r => `<tr><td>${escapeHtml(r.name)}</td><td>${r.start}</td><td>${r.end}</td></tr>`).join('');
        tableContainer.innerHTML = `<table><thead><tr><th>Name</th><th>Start</th><th>End</th></tr></thead><tbody>${rows}</tbody></table>`;
      }catch(e){
        console.error(e);
        tableContainer.innerHTML = '<p style="color:#c66">Failed to load data.</p>';
      }
    }

    // Find best slot
    document.getElementById('findSlotBtn').addEventListener('click', async ()=>{
      showToast('Finding best slot...');
      const s = parseFloat(windowStart.value) || 9.0;
      const e = parseFloat(windowEnd.value) || 18.0;
      const out = await postJSON('/find-best-slot', { startWindow: s, endWindow: e });
      if(!out || !out.result || !out.result.BestStart){
        showToast('No matching slots.');
        resultBox.style.display='none';
        return;
      }
      const { BestStart, Count, People } = out.result;
      resultBox.style.display='block';
      resultBox.textContent = `🕒 ${BestStart} hrs — (${Count} people): ${People}`;
      showToast('Best slot found!');
    });

    // Clear data
    document.getElementById('clearBtn').addEventListener('click', async ()=>{
      showToast('Clearing data...');
      try{
        const res = await fetch('/clear');
        const out = await res.json();
        showToast(out && out.message ? out.message : 'Cleared');
      }catch(e){
        console.error(e);
        showToast('Clear failed');
      }
      resultBox.style.display='none';
      tableContainer.innerHTML = '<p style="color:#7a7e92">No data yet.</p>';
    });

    // utilities
    function escapeHtml(unsafe){
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // init
    window.addEventListener('load', refreshTable);
  </script>
</body>
</html>
